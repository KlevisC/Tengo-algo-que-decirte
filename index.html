<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Special Elite', cursive;
    background: url('https://4kwallpapers.com/images/wallpapers/moon-planet-8k-5120x2880-87.jpg') no-repeat center center/cover;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    overflow-y: auto;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 1;
}

.container {
    max-width: 650px;
    padding: 20px;
    z-index: 2;
    position: relative;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    background: #ff4b6e;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

#mensaje {
    margin-top: 30px;
    opacity: 0;
    white-space: pre-line;
    text-align: left;
    line-height: 1.6;
}

.heart {
    font-size: 40px;
    animation: latido 1s infinite;
    display: none;
    margin-top: 20px;
}

@keyframes latido {
    50% { transform: scale(1.2); }
}

/* BOTÓN WHATSAPP */
#whatsappContainer {
    display: none;
    margin-top: 25px;
}

#whatsappContainer button {
    background: #25D366;
}
</style>
</head>

<body>

<div class="container">
    <h1>Te extraño</h1>
    <button onclick="iniciar()">Haz click aquí</button>

    <div id="mensaje"></div>

    <div class="heart" id="heart">🤍</div>

    <div id="whatsappContainer">
        <a id="whatsappLink" target="_blank">
            <button>Enviar mensaje 💬</button>
        </a>
    </div>
</div>

<audio id="musica" loop>
  <source src="stilllovingyou.mp3" type="audio/mpeg">
</audio>

<audio id="typingSound">
  <source src="typing.mp3" type="audio/mpeg">
</audio>

<script>
function iniciar() {
    const musica = document.getElementById("musica");
    musica.volume = 0.5;
    musica.play().catch(()=>{});

    mostrarMensaje();
}

function mostrarMensaje() {

const texto = `Leí todo lo que me escribiste… y no te voy a mentir, me dolió mucho, pero también me hizo pensar en todo lo que fuimos.

Quiero empezar diciéndote algo que no deberías seguir dudando, yo todavía te amo. Tal vez no de la forma en que tú lo necesitabas o lo esperabas,
y entiendo por qué llegaste a sentir todo eso, pero nunca fue que dejaras de importarme o que ya no sintiera nada por ti. Me duele saber que te sentiste
sola, ignorada o poco importante, porque de verdad nunca quise hacerte sentir así… y ahí es donde sí tengo que aceptar que fallé, que no supe
estar como lo necesitabas, o mejor dicho, como debía estarlo.

Tú fuiste demasiado importante para mí, y lo sigues siendo. No eres alguien que simplemente pasa y ya, fueron años contigo, creciendo juntos,
conociéndonos y amandonos, eso no se borra ni se reemplaza así como así. Tú marcaste mi vida, y eso es algo que siempre voy a llevar conmigo.

Sobre el tiempo que me pediste… quiero que entiendas algo, porque sé que desde tu lado se sintió como indiferencia. No fue así. 
Yo respeté ese tiempo porque era lo que tú querías, porque pensé que era lo correcto para ti, aunque por dentro me estuviera muriendo por
buscarte, o por simplemente saber cómo estabas.

También sé que muchas veces no entendí tu dolor, y eso me pesa. Me enfoqué en lo mío y no supe ver todo lo que tú estabas pasando por mi culpa.

Nunca quise ni esperé hacerte llegar hasta estos límites y lo siento, de verdad lo siento. Yo aun me imagino una vida contigo y la sigo deseando
desde que nos propusimos irnos a vivir juntos, aún lo considero una meta de mi vida y la mayor razon para seguir adelante en mi día a día y aún
no se como podría reestructurar mi vida en tu ausencia.

Si esto es tu manera de decir adiós, solo quiero que recuerdes esto: sí fuiste importante, sí te amé, y probablemente siempre te ame de alguna forma.

Con mucho amor, tu eterno amante 🤍.

`;

    const mensaje = document.getElementById("mensaje");
    mensaje.style.opacity = 1;

    let i = 0;
    const typingSound = document.getElementById("typingSound");
    typingSound.volume = 0.25;

    function escribir() {
        if (i < texto.length) {
            mensaje.innerHTML += texto.charAt(i);

            if (i % 3 === 0) {
                typingSound.currentTime = 0;
                typingSound.play().catch(()=>{});
            }

            i++;

            let delay = 45 + Math.random() * 60;

            if (texto[i] === "." || texto[i] === "," || texto[i] === "\n") {
                delay += 150;
            }

            setTimeout(escribir, delay);

        } else {
            typingSound.pause();

            document.getElementById("heart").style.display = "block";

            // 👉 BOTÓN WHATSAPP
            const container = document.getElementById("whatsappContainer");
            const link = document.getElementById("whatsappLink");

            const phone = "573128231503";
            const message = "Te extraño mucho, por favor enviame un mensaje, te necesito";

            link.href = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

            container.style.display = "block";
        }
    }

    escribir();
}
</script>

</body>
</html>
