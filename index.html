<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Special Elite', cursive;
    background: url('https://4kwallpapers.com/images/wallpapers/moon-planet-8k-5120x2880-87.jpg') no-repeat center center/cover;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 1;
}

.container {
    max-width: 600px;
    padding: 20px;
    z-index: 2;
    position: relative;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    background: #ff4b6e;
    color: white;
    cursor: pointer;
}

#mensaje {
    margin-top: 30px;
    opacity: 0;
    white-space: pre-line;
}

.heart {
    font-size: 40px;
    animation: latido 1s infinite;
}

@keyframes latido {
    50% { transform: scale(1.2); }
}
</style>
</head>

<body>

<div class="container">
    <h1>No sabía cómo decirte esto…</h1>
    <button onclick="iniciar()">Ábrelo cuando estés lista</button>

    <div id="mensaje"></div>
    <div class="heart" id="heart" style="display:none;">❤️</div>
</div>

<audio id="musica" loop>
  <source src="stilllovingyou.mp3" type="audio/mpeg">
</audio>

<audio id="typingSound">
  <source src="typing.mp3" type="audio/mpeg">
</audio>

<script>
function iniciar() {
    const musica = document.getElementById("musica");
    musica.playbackRate = 1;
    musica.volume = 0.5;
    musica.play().catch(()=>{});

    mostrarMensaje();
}

function mostrarMensaje() {
    const texto = `Leí todo lo que me escribiste… y no te voy a mentir, me dolió, pero también me hizo recordar todo lo que fuimos.

Yo todavía te amo.

Tal vez no supe demostrarlo como tú lo necesitabas...`;

    const mensaje = document.getElementById("mensaje");
    mensaje.style.opacity = 1;

    let i = 0;
    const typingSound = document.getElementById("typingSound");
    typingSound.volume = 0.25;

    function escribir() {
        if (i < texto.length) {
            mensaje.innerHTML += texto.charAt(i);

            // sonido cada 3 letras (evita saturación)
            if (i % 3 === 0) {
                typingSound.currentTime = 0;
                typingSound.play().catch(()=>{});
            }

            i++;

            let delay = 60 + Math.random() * 80;

            // pausas naturales
            if (texto[i] === "." || texto[i] === "," || texto[i] === "\n") {
                delay += 200;
            }

            setTimeout(escribir, delay);

        } else {
            typingSound.pause();
            typingSound.currentTime = 0;
            document.getElementById("heart").style.display = "block";
        }
    }

    escribir();
}
</script>

</body>
</html>
